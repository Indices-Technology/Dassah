version: '3.8'

services:
  ui:
    restart: always
    environment:
      - NODE_ENV=production
      # The UI accesses the API through the Nginx proxy via the public domain
      - NUXT_PUBLIC_API_URL=https://${DOMAIN}/api
      - NUXT_PUBLIC_SOCKET_URL=https://${DOMAIN}

  api:
    restart: always
    environment:
      - NODE_ENV=production

  worker:
    restart: always
    environment:
      - NODE_ENV=production

  openclaw:
    restart: always

  redis:
    restart: always

  postgres:
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ui
      - api