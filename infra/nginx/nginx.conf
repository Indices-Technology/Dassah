events {
    worker_connections 1024;
}

http {
    upstream ui_servers {
        server ui:3000;
    }

    upstream api_servers {
        server api:4000;
    }

    server {
        listen 80;
        server_name _; # Replace with your actual domain (e.g., dassai.indicestech.com)

        # 1. Route Socket.IO WebSocket traffic to the Express API
        location /socket.io/ {
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 2. Route standard HTTP API traffic
        location /api/ {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. Route all other traffic to the Nuxt 3 Frontend
        location / {
            proxy_pass http://ui_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}