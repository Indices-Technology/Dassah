name: DassaAI CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '**/package.json'

    - name: Install dependencies (API)
      working-directory: ./apps/api
      run: npm ci

    - name: Install dependencies (UI)
      working-directory: ./apps/ui
      run: npm ci

    - name: Build Nuxt Application
      working-directory: ./apps/ui
      run: npm run build
      
    # Add your test scripts here once you write unit tests
    # - run: npm run test